server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml+rss image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Long cache for hashed assets
    location ~* \.(js|css|woff2|avif|webp|jpg|jpeg|png|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Sitemap and robots — short cache
    location ~* \.(xml|txt)$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # HTML — no cache (always fresh for SEO)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback for 404s → index.html
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Block dotfiles
    location ~ /\. {
        deny all;
    }
}
